<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>員工打卡系統</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    background: #f7f9fb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    color: #333;
  }

  /* ── 頂部 Logo ── */
  .logo {
    width: 64px; height: 64px;
    border: 3px solid #4ecdc4;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .logo svg { width: 28px; height: 28px; stroke: #4ecdc4; fill: none; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(78,205,196,0.3); }
    50% { box-shadow: 0 0 0 10px rgba(78,205,196,0); }
  }

  .title { font-size: 22px; font-weight: 600; color: #444; margin-bottom: 4px; }
  .company { font-size: 14px; color: #aaa; margin-bottom: 24px; }

  /* ── 時鐘 ── */
  .clock-time {
    font-size: 56px; font-weight: 200; letter-spacing: 4px;
    color: #555; margin-bottom: 6px; font-variant-numeric: tabular-nums;
  }
  .clock-date { font-size: 14px; color: #aaa; margin-bottom: 32px; letter-spacing: 1px; }

  /* ── 卡片 ── */
  .card {
    width: 100%; max-width: 420px;
    background: #fff;
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .card-title { font-size: 13px; color: #bbb; margin-bottom: 16px; font-weight: 500; }

  /* ── 狀態列 ── */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: #f7f9fb; border-radius: 10px;
    padding: 12px 16px; margin-bottom: 16px;
    font-size: 14px;
  }
  .status-label { color: #999; }
  .status-value { font-weight: 600; color: #666; }
  .status-value.in { color: #4ecdc4; }
  .status-value.out { color: #ff6b6b; }

  /* ── 打卡按鈕 ── */
  .btn-row { display: flex; gap: 12px; margin-bottom: 16px; }
  .btn {
    flex: 1; border: none; border-radius: 14px;
    padding: 20px 12px; cursor: pointer;
    font-size: 15px; font-weight: 600;
    transition: transform 0.1s, opacity 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-in {
    background: rgba(78,205,196,0.1);
    border: 1.5px solid rgba(78,205,196,0.4);
    color: #4ecdc4;
  }
  .btn-out {
    background: rgba(255,193,7,0.1);
    border: 1.5px solid rgba(255,193,7,0.4);
    color: #e6a817;
  }
  .btn-emoji { font-size: 22px; }
  .btn-sub { font-size: 12px; font-weight: 400; opacity: 0.8; }

  /* ── 定位 ── */
  .location {
    background: #f7f9fb; border-radius: 10px;
    padding: 12px 16px; font-size: 13px; color: #888;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── 今日紀錄 ── */
  .records-empty { text-align: center; color: #ccc; font-size: 14px; padding: 16px 0; }
  .record-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px;
  }
  .record-item:last-child { border-bottom: none; }
  .record-type { font-weight: 600; }
  .record-type.in { color: #4ecdc4; }
  .record-type.out { color: #e6a817; }
  .record-time { color: #999; font-size: 13px; }
  .record-loc { color: #bbb; font-size: 12px; text-align: right; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #333; color: #fff; padding: 10px 22px;
    border-radius: 24px; font-size: 14px; opacity: 0;
    transition: all 0.3s; pointer-events: none; white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="logo">
  <svg viewBox="0 0 24 24" stroke-width="1.8">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="12 6 12 12 16 14"/>
  </svg>
</div>

<div class="title">員工打卡系統</div>
<div class="company" id="companyName">示範公司</div>

<div class="clock-time" id="clockTime">00:00:00</div>
<div class="clock-date" id="clockDate"></div>

<!-- 打卡操作 -->
<div class="card">
  <div class="card-title">打卡操作</div>

  <div class="status-bar">
    <span class="status-label">目前狀態</span>
    <span class="status-value" id="statusValue">未上班</span>
  </div>

  <div class="btn-row">
    <button class="btn btn-in" id="btnIn" onclick="clockAction('in')">
      <span class="btn-emoji">☀️</span>
      <span>打卡上班</span>
      <span class="btn-sub">Clock In</span>
    </button>
    <button class="btn btn-out" id="btnOut" onclick="clockAction('out')" disabled>
      <span class="btn-emoji">🌙</span>
      <span>打卡下班</span>
      <span class="btn-sub">Clock Out</span>
    </button>
  </div>

  <div class="location">
    📍 <span id="locationText">定位取得中...</span>
  </div>
</div>

<!-- 今日紀錄 -->
<div class="card">
  <div class="card-title">今日紀錄</div>
  <div id="recordsList"><div class="records-empty">尚無打卡紀錄</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── 時鐘 ──────────────────────────────────────────────
  const days = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
    const y = now.getFullYear();
    const mo = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    document.getElementById('clockDate').textContent =
      `${y} / ${mo} / ${d}　${days[now.getDay()]}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── 定位 ──────────────────────────────────────────────
  let locationText = '位置未知';
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        locationText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        document.getElementById('locationText').textContent = locationText;
      },
      () => {
        locationText = '無法取得定位';
        document.getElementById('locationText').textContent = locationText;
      }
    );
  } else {
    locationText = '瀏覽器不支援定位';
    document.getElementById('locationText').textContent = locationText;
  }

  // ── 狀態管理（localStorage）────────────────────────────
  const todayKey = () => new Date().toISOString().slice(0,10);

  function loadRecords() {
    return JSON.parse(localStorage.getItem('clockRecords_' + todayKey()) || '[]');
  }
  function saveRecord(type) {
    const records = loadRecords();
    const now = new Date();
    records.push({
      type,
      time: now.toTimeString().slice(0,8),
      location: locationText
    });
    localStorage.setItem('clockRecords_' + todayKey(), JSON.stringify(records));
    return records;
  }

  function getStatus() {
    const records = loadRecords();
    if (!records.length) return 'none';
    return records[records.length - 1].type === 'in' ? 'in' : 'out';
  }

  function renderRecords() {
    const records = loadRecords();
    const el = document.getElementById('recordsList');
    if (!records.length) {
      el.innerHTML = '<div class="records-empty">尚無打卡紀錄</div>';
      return;
    }
    el.innerHTML = records.map(r => `
      <div class="record-item">
        <div>
          <div class="record-type ${r.type}">${r.type === 'in' ? '☀️ 打卡上班' : '🌙 打卡下班'}</div>
          <div class="record-time">${r.time}</div>
        </div>
        <div class="record-loc">${r.location}</div>
      </div>
    `).join('');
  }

  function syncButtons() {
    const s = getStatus();
    const btnIn  = document.getElementById('btnIn');
    const btnOut = document.getElementById('btnOut');
    const sv     = document.getElementById('statusValue');
    if (s === 'in') {
      btnIn.disabled = true; btnOut.disabled = false;
      sv.textContent = '上班中'; sv.className = 'status-value in';
    } else if (s === 'out') {
      btnIn.disabled = false; btnOut.disabled = true;
      sv.textContent = '已下班'; sv.className = 'status-value out';
    } else {
      btnIn.disabled = false; btnOut.disabled = true;
      sv.textContent = '未上班'; sv.className = 'status-value';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function clockAction(type) {
    saveRecord(type);
    syncButtons();
    renderRecords();
    showToast(type === 'in' ? '✅ 上班打卡成功' : '👋 下班打卡成功');
  }

  // ── 初始化 ────────────────────────────────────────────
  syncButtons();
  renderRecords();
</script>
</body>
</html>
