<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>農民曆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a0000;
      color: #FFD700;
      font-family: 'Noto Serif TC', 'Songti SC', 'SimSun', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      user-select: none;
    }

    /* 上下裝飾線 */
    .border-line {
      width: 90%;
      height: 3px;
      background: linear-gradient(to right, transparent, #FFD700, transparent);
      margin: 16px 0;
    }

    /* 年份 */
    .year-name {
      font-size: clamp(36px, 10vw, 56px);
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 6px;
      text-align: center;
    }

    /* 生肖 */
    .zodiac {
      font-size: clamp(22px, 6vw, 36px);
      color: #FFCC66;
      margin-top: 6px;
      letter-spacing: 4px;
    }

    /* 節氣（平時隱藏） */
    .solar-term {
      font-size: clamp(20px, 5vw, 30px);
      color: #A5D6A7;
      font-weight: bold;
      margin-top: 14px;
      letter-spacing: 3px;
      min-height: 40px;
      text-align: center;
    }

    /* 分隔線 */
    .divider {
      width: 160px;
      height: 2px;
      background: rgba(255, 215, 0, 0.35);
      margin: 20px 0;
    }

    /* 農曆月 */
    .lunar-month {
      font-size: clamp(52px, 16vw, 90px);
      font-weight: bold;
      color: #FFF8E1;
      letter-spacing: 8px;
      line-height: 1.1;
    }

    /* 農曆日（最大） */
    .lunar-day {
      font-size: clamp(80px, 26vw, 140px);
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 6px;
      line-height: 1;
      margin-top: -8px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
    }

    /* 國曆區 */
    .solar-section {
      margin-top: 8px;
      text-align: center;
    }
    .solar-date {
      font-size: clamp(24px, 6.5vw, 38px);
      color: #FFCC66;
      letter-spacing: 2px;
    }
    .weekday {
      font-size: clamp(24px, 6.5vw, 38px);
      color: #FFCC66;
      margin-top: 4px;
      letter-spacing: 4px;
    }
  </style>
  <!-- Google Font（有網路才會載入，沒有也能用系統字體） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="border-line"></div>

  <div class="year-name" id="yearName">丙午年</div>
  <div class="zodiac" id="zodiac">【馬年】</div>
  <div class="solar-term" id="solarTerm"></div>

  <div class="divider"></div>

  <div class="lunar-month" id="lunarMonth">三月</div>
  <div class="lunar-day" id="lunarDay">初九</div>

  <div class="divider"></div>

  <div class="solar-section">
    <div class="solar-date" id="solarDate">2026年4月17日</div>
    <div class="weekday" id="weekday">星期五</div>
  </div>

  <div class="border-line"></div>

<script>
  const STEMS   = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const BRANCHES= ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const ZODIAC  = ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
  const WEEKDAYS= ['日','一','二','三','四','五','六'];

  // 節氣查表（2026~2028，每年可自行增補）
  const SOLAR_TERMS = {
    '2026-01-05':'小寒','2026-01-20':'大寒','2026-02-04':'立春','2026-02-19':'雨水',
    '2026-03-06':'驚蟄','2026-03-20':'春分','2026-04-05':'清明','2026-04-20':'穀雨',
    '2026-05-05':'立夏','2026-05-21':'小滿','2026-06-06':'芒種','2026-06-21':'夏至',
    '2026-07-07':'小暑','2026-07-23':'大暑','2026-08-07':'立秋','2026-08-23':'處暑',
    '2026-09-08':'白露','2026-09-23':'秋分','2026-10-08':'寒露','2026-10-23':'霜降',
    '2026-11-07':'立冬','2026-11-22':'小雪','2026-12-07':'大雪','2026-12-22':'冬至',
    '2027-01-05':'小寒','2027-01-20':'大寒','2027-02-03':'立春','2027-02-18':'雨水',
    '2027-03-06':'驚蟄','2027-03-21':'春分','2027-04-05':'清明','2027-04-20':'穀雨',
    '2027-05-06':'立夏','2027-05-21':'小滿','2027-06-06':'芒種','2027-06-21':'夏至',
    '2027-07-07':'小暑','2027-07-23':'大暑','2027-08-07':'立秋','2027-08-23':'處暑',
    '2027-09-08':'白露','2027-09-23':'秋分','2027-10-08':'寒露','2027-10-24':'霜降',
    '2027-11-07':'立冬','2027-11-22':'小雪','2027-12-07':'大雪','2027-12-22':'冬至',
    '2028-01-06':'小寒','2028-01-21':'大寒','2028-02-04':'立春','2028-02-19':'雨水',
    '2028-03-05':'驚蟄','2028-03-20':'春分','2028-04-04':'清明','2028-04-19':'穀雨',
    '2028-05-05':'立夏','2028-05-20':'小滿','2028-06-05':'芒種','2028-06-21':'夏至',
    '2028-07-06':'小暑','2028-07-22':'大暑','2028-08-07':'立秋','2028-08-22':'處暑',
    '2028-09-07':'白露','2028-09-22':'秋分','2028-10-07':'寒露','2028-10-22':'霜降',
    '2028-11-06':'立冬','2028-11-21':'小雪','2028-12-06':'大雪','2028-12-21':'冬至',
  };

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    const now = new Date();
    const sy = now.getFullYear();
    const sm = now.getMonth() + 1;
    const sd = now.getDate();
    const dow = now.getDay();

    // ── 農曆（瀏覽器內建 Intl，不需任何套件）──
    const fmt = new Intl.DateTimeFormat('zh-TW-u-ca-chinese', {
      month: 'long',
      day:   'numeric'
    });
    const parts = fmt.formatToParts(now);
    const lunarMonth = parts.find(p => p.type === 'month')?.value ?? '';
    const lunarDay   = parts.find(p => p.type === 'day')?.value   ?? '';

    // ── 天干地支年（以1984甲子為基準，農曆年以立春前後切換）──
    // 立春通常在2/3~2/5；用2/4作近似切換點
    const lunarYear = (sm === 1 || (sm === 2 && sd < 4)) ? sy - 1 : sy;
    const diff = lunarYear - 1984;
    const stemIdx   = ((diff % 10) + 10) % 10;
    const branchIdx = ((diff % 12) + 12) % 12;

    // ── 節氣 ──
    const key = `${sy}-${pad(sm)}-${pad(sd)}`;
    const solarTerm = SOLAR_TERMS[key] ?? '';

    // ── 更新畫面 ──
    document.getElementById('yearName').textContent  = `${STEMS[stemIdx]}${BRANCHES[branchIdx]}年`;
    document.getElementById('zodiac').textContent    = `【${ZODIAC[branchIdx]}年】`;
    document.getElementById('lunarMonth').textContent = lunarMonth;
    document.getElementById('lunarDay').textContent   = lunarDay;
    document.getElementById('solarDate').textContent  = `${sy}年${sm}月${sd}日`;
    document.getElementById('weekday').textContent    = `星期${WEEKDAYS[dow]}`;
    document.getElementById('solarTerm').textContent  = solarTerm ? `◆ 今日節氣：${solarTerm} ◆` : '';
  }

  // 立即執行
  update();

  // 每天零時自動換日
  function scheduleNextDay() {
    const now = new Date();
    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 1, 0);
    setTimeout(() => { update(); scheduleNextDay(); }, tomorrow - now);
  }
  scheduleNextDay();
</script>
</body>
</html>
